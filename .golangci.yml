version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - unconvert
    - gocritic

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mikecafarella/permcop

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
