version: 2

builds:
  - id: permcop
    main: ./cmd/permcop
    binary: permcop
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  header: |
    {{ .TagBody }}

    ---

brews:
  - name: permcop
    repository:
      owner: phobologic
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/phobologic/permcop"
    description: "A rule-based permission filter for Claude Code PreToolUse hooks."
    install: |
      bin.install "permcop"
    test: |
      system "#{bin}/permcop version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
